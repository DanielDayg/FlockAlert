name: FlockAlert

schemes:
  FlockAlert:
    build:
      targets:
        FlockAlert: all
        FlockAlertWidget: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"

options:
  bundleIdPrefix: com.flockalert
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: G2VP9DN2R5
    CODE_SIGN_STYLE: Automatic

targets:
  FlockAlert:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FlockAlert
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: FlockAlert/Resources/SeedCameras.json
      - path: FlockAlert/Resources/Assets.xcassets
      - path: FlockAlert/Resources/tweet.caf
      - path: FlockAlert/PrivacyInfo.xcprivacy
    info:
      path: FlockAlert/Resources/Info.plist
      properties:
        CFBundleName: Flock Alert
        CFBundleDisplayName: Flock Alert
        CFBundleIdentifier: com.flockalert.app
        CFBundleShortVersionString: "1.3.2"
        CFBundleVersion: "16"
        LSRequiresIPhoneOS: true
        # NOTE: do NOT require "gps" here — WiFi-only iPads lack a GPS receiver, so
        # requiring it blocks installation on those devices and gets the app rejected
        # under Guideline 2.3 ("won't install on the review device"). location-services
        # is present on every iPhone/iPad and is enough; the app degrades gracefully
        # to WiFi/assisted location where hardware GPS isn't available.
        UIRequiredDeviceCapabilities:
          - location-services
        UIBackgroundModes:
          - location
          - fetch
          - processing
          - audio
        BGTaskSchedulerPermittedIdentifiers:
          - com.flockalert.app.weeklyreport
        NSLocationAlwaysAndWhenInUseUsageDescription: "Flock Alert uses your location to alert you as you approach documented surveillance cameras. Your location is never sent to our servers."
        NSLocationAlwaysUsageDescription: "Flock Alert monitors for nearby surveillance cameras in the background so you can receive alerts while driving."
        NSLocationWhenInUseUsageDescription: "Flock Alert shows surveillance cameras near your current location."
        NSCameraUsageDescription: "Take photos of cameras when submitting community reports to help verify locations."
        NSPhotoLibraryUsageDescription: "Select photos from your library to attach to camera reports."
        NSMicrophoneUsageDescription: "Accessed as part of camera functionality when taking report photos."
        CFBundleIconName: AppIcon
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: FlockAlert/FlockAlert.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flockalert.app
        INFOPLIST_FILE: FlockAlert/Resources/Info.plist
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: FlockAlert/FlockAlert.entitlements
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - target: FlockAlertWidget
        embed: true
    capabilities:
      maps: {}
      signInWithApple: {}
      inAppPurchase: {}
      appGroups:
        groups:
          - group.com.flockalert.app

  FlockAlertWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FlockAlertWidget
        excludes:
          - "Info.plist"
    info:
      path: FlockAlertWidget/Info.plist
      properties:
        CFBundleName: FlockAlert Widget
        CFBundleDisplayName: FlockAlert Widget
        CFBundleIdentifier: com.flockalert.app.widget
        CFBundleShortVersionString: "1.3.2"
        CFBundleVersion: "16"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flockalert.app.widget
        INFOPLIST_FILE: FlockAlertWidget/Info.plist
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: G2VP9DN2R5
    capabilities:
      appGroups:
        groups:
          - group.com.flockalert.app
