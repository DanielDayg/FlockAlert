<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flock Alert — Privacy Transparency App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e2e8f0; line-height: 1.6; }
    header { padding: 80px 24px 60px; text-align: center; background: linear-gradient(180deg, #0f0f1a 0%, #0a0a0f 100%); }
    header h1 { font-size: 48px; font-weight: 900; color: #fff; letter-spacing: -1px; }
    header h1 span { color: #6366f1; }
    header p { font-size: 18px; color: #94a3b8; margin-top: 12px; max-width: 500px; margin-left: auto; margin-right: auto; }
    .badge { display: inline-block; background: #6366f1; color: #fff; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 20px; margin-top: 16px; letter-spacing: 0.5px; }
    .links { display: flex; gap: 16px; justify-content: center; margin-top: 32px; flex-wrap: wrap; }
    .links a { color: #6366f1; text-decoration: none; font-weight: 600; border: 1px solid #6366f133; padding: 10px 24px; border-radius: 10px; }
    .links a:hover { background: #6366f11a; }
    footer { text-align: center; padding: 40px 24px; color: #475569; font-size: 13px; border-top: 1px solid #1e293b; }
  </style>
</head>
<body>
  <header>
    <h1>Flock <span>Alert</span></h1>
    <p>The Waze of public surveillance transparency. Know what's watching.</p>
    <span class="badge">Available on the App Store</span>
    <div class="links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Use</a>
    </div>
  </header>
  <footer>
    <p>&copy; 2025 Flock Alert. Built for informed citizens.</p>
  </footer>
</body>
</html>
